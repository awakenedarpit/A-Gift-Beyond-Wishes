<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ================= LOADER ================= -->

<div id="loader">

    <h2>Loading Your Surprise...</h2>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

</div>


<!-- ================= HERO ================= -->

<section id="hero">

    <div class="stars"></div>

    <div class="overlay"></div>

    <div class="hero-content">

        <h3 class="small-title">
            A Little Surprise For
        </h3>

        <h1>
            Mahima Kanoujiya
        </h1>

        <p>
            Every star has a story...
            <br>
            Tonight, this one is yours.
        </p>

        <button id="beginBtn">
            ✨ Tap To Begin
        </button>

    </div>

</section>

<!-- ================= MUSIC ================= -->

<audio id="bgMusic" loop>

    <source src="assets/music/birthday.mp3" type="audio/mpeg">

</audio>

<button id="musicBtn">

    🎵

</button>

<!-- JS -->

<script src="script.js"></script>

</body>
</html>
