<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>A Gift Beyond Wishes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/main.css">

<link rel="stylesheet" href="css/hero.css">

<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div id="app">

<section id="hero">

    <div class="background"></div>
    <div class="stars"></div>
    <div id="shooting-stars"></div>

    <div class="hero-content">

        <p class="top-text">
            ✨ A Special Birthday Experience ✨
        </p>

        <h1>
            Happy Birthday
        </h1>

        <h2 id="recipientName">
            Mahima Kanoujiya
        </h2>

        <p class="subtitle">
            Every star has a story...
            <br>
            Tonight, one shines for you.
        </p>

        <button id="startJourney">
            Begin Your Journey →
        </button>

    </div>

</section>

<section id="letter"></section>

<section id="celebrating" class="scene hidden">

    <div class="section-header">

        <h2>Celebrating You ✨</h2>

        <p>
            Some qualities make a person unforgettable.
        </p>

    </div>

    <div id="cardContainer" class="card-grid"></div>

    <button id="openGallery">
        Continue to Gallery →
    </button>

</section>

<section id="gallery"></section>

<section id="celebration"></section>

<section id="ending"></section>

</div>

<script src="config.js"></script>

<script src="js/app.js"></script>

<script src="js/hero.js"></script>

</body>

</html>
